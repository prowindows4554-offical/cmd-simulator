<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Command Prompt</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #000;
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
font-family: ‘Consolas’, ‘Courier New’, monospace;
}

.window {
width: 800px;
height: 520px;
background: #000;
border: 1px solid #888;
display: flex;
flex-direction: column;
box-shadow: 2px 2px 8px rgba(0,0,0,0.8);
resize: both;
overflow: hidden;
min-width: 400px;
min-height: 200px;
}

.titlebar {
background: linear-gradient(to bottom, #0a3a6e, #073060);
height: 28px;
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 4px 0 8px;
flex-shrink: 0;
cursor: default;
user-select: none;
}

.titlebar-left {
display: flex;
align-items: center;
gap: 6px;
}

.titlebar-icon {
width: 16px;
height: 16px;
}

.titlebar-icon svg {
width: 100%;
height: 100%;
}

.titlebar-title {
color: #fff;
font-size: 12px;
font-family: ‘Segoe UI’, Tahoma, sans-serif;
}

.titlebar-buttons {
display: flex;
height: 100%;
}

.tb-btn {
width: 46px;
height: 100%;
display: flex;
align-items: center;
justify-content: center;
color: #fff;
font-size: 10px;
cursor: pointer;
font-family: ‘Segoe UI’, Tahoma, sans-serif;
}

.tb-btn:hover { background: rgba(255,255,255,0.15); }
.tb-btn.close:hover { background: #e81123; }

.menubar {
background: #000;
border-bottom: 1px solid #333;
padding: 2px 4px;
display: flex;
gap: 2px;
flex-shrink: 0;
}

.menu-item {
color: #c0c0c0;
font-size: 11px;
font-family: ‘Segoe UI’, Tahoma, sans-serif;
padding: 2px 8px;
cursor: default;
user-select: none;
}

.menu-item:hover {
background: #1a1a1a;
}

.terminal {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
padding: 4px;
background: #000;
cursor: text;
color: #c0c0c0;
font-size: 14px;
line-height: 1.3;
}

.terminal::-webkit-scrollbar { width: 12px; }
.terminal::-webkit-scrollbar-track { background: #1a1a1a; }
.terminal::-webkit-scrollbar-thumb { background: #555; border: 2px solid #1a1a1a; }

.output-line {
white-space: pre-wrap;
word-break: break-all;
color: #c0c0c0;
}

.output-line.error { color: #ff6b6b; }
.output-line.system { color: #c0c0c0; }

.input-line {
display: flex;
align-items: flex-start;
}

.prompt {
color: #c0c0c0;
white-space: nowrap;
flex-shrink: 0;
}

.input-area {
flex: 1;
position: relative;
display: inline-block;
}

#cmd-input {
background: transparent;
border: none;
outline: none;
color: #c0c0c0;
font-family: ‘Consolas’, ‘Courier New’, monospace;
font-size: 14px;
line-height: 1.3;
width: 100%;
caret-color: #c0c0c0;
}

.blink-cursor {
display: inline-block;
width: 8px;
height: 14px;
background: #c0c0c0;
animation: blink 1s step-end infinite;
vertical-align: text-bottom;
margin-left: 1px;
}

@keyframes blink {
0%, 100% { opacity: 1; }
50% { opacity: 0; }
}
</style>

</head>
<body>
<div class="window" id="window">
  <div class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <div class="titlebar-icon">
        <svg viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="14" height="14" rx="1" fill="#000" stroke="#555"/>
          <text x="2" y="12" font-size="10" fill="#c0c0c0" font-family="Consolas">C:\</text>
        </svg>
      </div>
      <span class="titlebar-title">Command Prompt</span>
    </div>
    <div class="titlebar-buttons">
      <div class="tb-btn" title="Minimize" onclick="minimizeWindow()">&#8722;</div>
      <div class="tb-btn" title="Maximize" onclick="toggleMaximize()">&#9633;</div>
      <div class="tb-btn close" title="Close" onclick="closeWindow()">&#10005;</div>
    </div>
  </div>
  <div class="menubar">
    <div class="menu-item">File</div>
    <div class="menu-item">Edit</div>
    <div class="menu-item">View</div>
    <div class="menu-item">Help</div>
  </div>
  <div class="terminal" id="terminal" onclick="focusInput()">
    <div id="output"></div>
    <div class="input-line" id="input-line">
      <span class="prompt" id="prompt">C:\Users\User&gt;</span>
      <div class="input-area">
        <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" />
      </div>
    </div>
  </div>
</div>

<script>
const terminal = document.getElementById('terminal');
const output = document.getElementById('output');
const cmdInput = document.getElementById('cmd-input');
const promptEl = document.getElementById('prompt');
const win = document.getElementById('window');
const titlebar = document.getElementById('titlebar');

let currentDir = 'C:\\Users\\User';
let history = [];
let historyIndex = -1;
let isMaximized = false;
let originalStyle = {};

const fileSystem = {
  'C:': {
    type: 'dir',
    children: {
      'Users': {
        type: 'dir',
        children: {
          'User': {
            type: 'dir',
            children: {
              'Desktop': { type: 'dir', children: {
                'readme.txt': { type: 'file', content: 'Welcome to Windows CMD Simulator!\r\nType "help" for available commands.', size: 64, date: '01/01/2024  12:00 PM' }
              }},
              'Documents': { type: 'dir', children: {
                'notes.txt': { type: 'file', content: 'Some important notes here.\r\nLine 2.\r\nLine 3.', size: 44, date: '01/01/2024  12:00 PM' }
              }},
              'Downloads': { type: 'dir', children: {} },
              'AppData': { type: 'dir', children: {
                'Local': { type: 'dir', children: {} },
                'Roaming': { type: 'dir', children: {} }
              }}
            }
          },
          'Public': { type: 'dir', children: {} }
        }
      },
      'Windows': {
        type: 'dir',
        children: {
          'System32': { type: 'dir', children: {
            'cmd.exe': { type: 'file', content: '', size: 289792, date: '01/01/2024  12:00 PM' },
            'notepad.exe': { type: 'file', content: '', size: 201728, date: '01/01/2024  12:00 PM' }
          }},
          'SysWOW64': { type: 'dir', children: {} }
        }
      },
      'Program Files': { type: 'dir', children: {} },
      'Program Files (x86)': { type: 'dir', children: {} }
    }
  }
};

const createdFiles = {};

function getNode(path) {
  if (createdFiles[path]) return createdFiles[path];
  const parts = normalizePath(path).replace(/\\/g, '/').split('/').filter(Boolean);
  let node = fileSystem;
  for (const part of parts) {
    if (!node[part] && !node.children?.[part]) return null;
    node = node[part] || node.children[part];
    if (node.children !== undefined) {
      // keep going
    }
  }
  return node;
}

function normalizePath(p) {
  if (!p) return currentDir;
  p = p.trim();
  if (/^[A-Za-z]:/.test(p)) return p;
  if (p.startsWith('\\')) return currentDir.substring(0,2) + p;
  if (p === '..') {
    const parts = currentDir.split('\\');
    if (parts.length > 1) parts.pop();
    return parts.join('\\');
  }
  if (p === '.') return currentDir;
  const parts = p.split('\\');
  let resolved = currentDir;
  for (const part of parts) {
    if (part === '..') {
      const rparts = resolved.split('\\');
      if (rparts.length > 1) rparts.pop();
      resolved = rparts.join('\\');
    } else if (part !== '.') {
      resolved = resolved + '\\' + part;
    }
  }
  return resolved;
}

function getDirNode(path) {
  const norm = normalizePath(path || currentDir);
  const parts = norm.split('\\').filter(Boolean);
  
  // handle drive root
  const drivePart = parts[0]; // e.g. "C:"
  let node = fileSystem[drivePart];
  if (!node) return null;

  for (let i = 1; i < parts.length; i++) {
    if (!node.children || !node.children[parts[i]]) {
      // check createdFiles
      const subpath = parts.slice(0,i+1).join('\\');
      if (createdFiles[subpath]) { node = createdFiles[subpath]; continue; }
      return null;
    }
    node = node.children[parts[i]];
  }
  return node;
}

function print(text, cls = '') {
  const line = document.createElement('div');
  line.className = 'output-line' + (cls ? ' ' + cls : '');
  line.textContent = text;
  output.appendChild(line);
}

function printHTML(html) {
  const line = document.createElement('div');
  line.className = 'output-line';
  line.innerHTML = html;
  output.appendChild(line);
}

function printBlank() { print(''); }

function updatePrompt() {
  promptEl.textContent = currentDir + '>';
}

const now = new Date();
const bootDate = now.toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

function init() {
  print('Microsoft Windows [Version 10.0.19045.3930]');
  print('(c) Microsoft Corporation. All rights reserved.');
  printBlank();
  updatePrompt();
  focusInput();
}

function focusInput() {
  cmdInput.focus();
}

cmdInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const cmd = cmdInput.value;
    const promptText = promptEl.textContent;
    
    // Echo the command
    const echoLine = document.createElement('div');
    echoLine.className = 'output-line';
    echoLine.textContent = promptText + cmd;
    output.appendChild(echoLine);

    if (cmd.trim()) {
      history.unshift(cmd);
      historyIndex = -1;
    }

    cmdInput.value = '';
    processCommand(cmd.trim());
    updatePrompt();
    scrollToBottom();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex < history.length - 1) {
      historyIndex++;
      cmdInput.value = history[historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      cmdInput.value = history[historyIndex];
    } else {
      historyIndex = -1;
      cmdInput.value = '';
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    autocomplete();
  }
});

function autocomplete() {
  const val = cmdInput.value;
  const parts = val.split(' ');
  const partial = parts[parts.length - 1];
  if (!partial) return;

  const node = getDirNode(currentDir);
  if (!node || !node.children) return;

  const matches = Object.keys(node.children).filter(k => k.toLowerCase().startsWith(partial.toLowerCase()));
  if (matches.length === 1) {
    parts[parts.length - 1] = matches[0];
    cmdInput.value = parts.join(' ');
  }
}

function scrollToBottom() {
  terminal.scrollTop = terminal.scrollHeight;
}

function processCommand(input) {
  if (!input) { printBlank(); return; }

  const parts = parseArgs(input);
  const cmd = parts[0].toLowerCase();
  const args = parts.slice(1);
  const raw = input.substring(cmd.length).trim();

  switch(cmd) {
    case 'help': cmdHelp(); break;
    case 'cls': case 'clear': output.innerHTML = ''; break;
    case 'dir': cmdDir(args); break;
    case 'cd': case 'chdir': cmdCd(raw); break;
    case 'echo': cmdEcho(raw); break;
    case 'type': cmdType(args); break;
    case 'mkdir': case 'md': cmdMkdir(args); break;
    case 'rmdir': case 'rd': cmdRmdir(args); break;
    case 'del': case 'erase': cmdDel(args); break;
    case 'copy': cmdCopy(args); break;
    case 'move': cmdMove(args); break;
    case 'ren': case 'rename': cmdRen(args); break;
    case 'ver': cmdVer(); break;
    case 'date': cmdDate(); break;
    case 'time': cmdTime(); break;
    case 'whoami': print(currentDir.includes('User') ? 'DESKTOP-PC\\User' : 'SYSTEM'); break;
    case 'hostname': print('DESKTOP-PC'); break;
    case 'set': cmdSet(raw); break;
    case 'path': print(envVars['PATH']); break;
    case 'color': cmdColor(args); break;
    case 'title': cmdTitle(raw); break;
    case 'prompt': cmdPrompt(raw); break;
    case 'pause': print('Press any key to continue . . .'); break;
    case 'exit': closeWindow(); break;
    case 'ping': cmdPing(args); break;
    case 'ipconfig': cmdIpconfig(); break;
    case 'systeminfo': cmdSysteminfo(); break;
    case 'tasklist': cmdTasklist(); break;
    case 'netstat': cmdNetstat(); break;
    case 'tree': cmdTree(args); break;
    case 'attrib': print(''); break;
    case 'find': cmdFind(args, raw); break;
    case 'more': print('--- More ---'); break;
    case 'sort': print(''); break;
    case 'fc': print('Comparing files...'); break;
    case 'xcopy': print('0 File(s) copied'); break;
    case 'format': print("The type of the file system is NTFS.\r\nWARNING, ALL DATA ON NON-REMOVABLE DISK\r\nDRIVE C: WILL BE LOST!\r\nProceed with Format (Y/N)?"); break;
    case 'chkdsk': cmdChkdsk(); break;
    case 'sfc': print('Beginning system scan.  This process will take some time.\r\n\r\nBeginning verification phase of system scan.\r\nVerification 100% complete.\r\n\r\nWindows Resource Protection did not find any integrity violations.'); break;
    case 'diskpart': print("Microsoft DiskPart version 10.0.19041.964\r\nCopyright (C) Microsoft Corporation.\r\nOn computer: DESKTOP-PC"); break;
    case 'shutdown': cmdShutdown(args); break;
    case 'powercfg': print('Power configuration updated.'); break;
    case 'regedit': print("'regedit' is not recognized as an internal or external command,\r\noperable program or batch file."); break;
    case 'calc': print("'calc' is not recognized as an internal or external command."); break;
    case 'notepad': print("Starting Notepad..."); break;
    case 'start': print(''); break;
    case 'runas': print("Attempting to start as different user..."); break;
    case 'assoc': print('.exe=exefile\r\n.txt=txtfile\r\n.bat=batfile\r\n.cmd=cmdfile'); break;
    case 'ftype': print('exefile="%1" %*\r\ntxtfile=%SystemRoot%\\system32\\NOTEPAD.EXE %1'); break;
    case 'where': cmdWhere(args); break;
    case 'if': print(''); break;
    case 'for': print(''); break;
    case 'goto': print(''); break;
    case 'call': print(''); break;
    case 'rem': break; // comment
    case 'mode': print('Status for device CON:\r\n-----------------------\r\n    Lines:          300\r\n    Columns:        120\r\n    Keyboard rate:  31\r\n    Keyboard delay: 1\r\n    Code page:      437'); break;
    case 'vol': print('Volume in drive C is Windows\r\nVolume Serial Number is B4D7-9F3A'); break;
    case 'label': print(''); break;
    case 'subst': print(''); break;
    case 'net': cmdNet(args); break;
    case 'nslookup': cmdNslookup(args); break;
    case 'tracert': cmdTracert(args); break;
    case 'arp': print('Interface: 192.168.1.100 --- 0x3\r\n  Internet Address      Physical Address      Type\r\n  192.168.1.1           00-11-22-33-44-55     dynamic'); break;
    case 'netsh': print('The following commands are available:\r\n\r\nCommands in this context:\r\nadvfirewall - Changes to the `netsh advfirewall\' context.\r\nbridge      - Changes to the `netsh bridge\' context.\r\ndhcpclient  - Changes to the `netsh dhcpclient\' context.'); break;
    case 'sc': print('DESCRIPTION:\r\n        SC is a command line program used for communicating with the\r\n        Service Control Manager and services.'); break;
    case 'wmic': print('wmic:root\\cli>'); break;
    case 'powershell': print("Windows PowerShell\r\nCopyright (C) Microsoft Corporation. All rights reserved.\r\n\r\nTry the new cross-platform PowerShell https://aka.ms/pscore6"); break;
    case 'cmd': print('Microsoft Windows [Version 10.0.19045.3930]\r\n(c) Microsoft Corporation. All rights reserved.'); break;
    default:
      print(`'${parts[0]}' is not recognized as an internal or external command,`);
      print('operable program or batch file.');
  }
  printBlank();
}

const envVars = {
  'COMPUTERNAME': 'DESKTOP-PC',
  'USERNAME': 'User',
  'USERPROFILE': 'C:\\Users\\User',
  'APPDATA': 'C:\\Users\\User\\AppData\\Roaming',
  'TEMP': 'C:\\Users\\User\\AppData\\Local\\Temp',
  'TMP': 'C:\\Users\\User\\AppData\\Local\\Temp',
  'SYSTEMROOT': 'C:\\Windows',
  'WINDIR': 'C:\\Windows',
  'SYSTEMDRIVE': 'C:',
  'HOMEDRIVE': 'C:',
  'HOMEPATH': '\\Users\\User',
  'PATH': 'C:\\Windows\\system32;C:\\Windows;C:\\Windows\\System32\\Wbem',
  'PROCESSOR_ARCHITECTURE': 'AMD64',
  'NUMBER_OF_PROCESSORS': '8',
  'OS': 'Windows_NT',
  'PATHEXT': '.COM;.EXE;.BAT;.CMD;.VBS;.VBE;.JS;.JSE;.WSF;.WSH;.MSC',
  'PROMPT': '$P$G'
};

function parseArgs(input) {
  const args = [];
  let current = '';
  let inQuote = false;
  for (let i = 0; i < input.length; i++) {
    if (input[i] === '"') { inQuote = !inQuote; continue; }
    if (input[i] === ' ' && !inQuote) {
      if (current) { args.push(current); current = ''; }
    } else {
      current += input[i];
    }
  }
  if (current) args.push(current);
  return args;
}

function cmdHelp() {
  print('For more information on a specific command, type HELP command-name');
  printBlank();
  const cmds = [
    ['ASSOC', 'Displays or modifies file extension associations.'],
    ['ATTRIB', 'Displays or changes file attributes.'],
    ['CALL', 'Calls one batch program from another.'],
    ['CD', 'Displays the name of or changes the current directory.'],
    ['CHKDSK', 'Checks a disk and displays a status report.'],
    ['CLS', 'Clears the screen.'],
    ['COPY', 'Copies one or more files to another location.'],
    ['DATE', 'Displays or sets the date.'],
    ['DEL', 'Deletes one or more files.'],
    ['DIR', 'Displays a list of files and subdirectories in a directory.'],

    ['LABEL', 'Creates, changes, or deletes the volume label of a disk.'],

    ['MORE', 'Displays output one screen at a time.'],
    ['MOVE', 'Moves one or more files from one directory to another.'],
    ['NET', 'Manages network resources.'],
    ['NETSTAT', 'Displays active TCP connections.'],
    ['PATH', 'Displays or sets a search path for executable files.'],

    ['REN', 'Renames a file or files.'],
    ['RENAME', 'Renames a file or files.'],

    ['SET', 'Displays, sets, or removes Windows environment variables.'],
    ['SFC', 'Scans integrity of all protected system files.'],

    ['SORT', 'Sorts input.'],
    ['START', 'Starts a separate window to run a specified program or command.'],
    ['SUBST', 'Associates a path with a drive letter.'],
    ['SYSTEMINFO', 'Displays machine specific properties and configuration.'],
    ['TASKLIST', 'Displays all currently running tasks.'],
    ['TIME', 'Displays or sets the system time.'],
    ['TITLE', 'Sets the window title for a CMD.EXE session.'],
    ['TREE', 'Graphically displays the directory structure of a drive or path.'],
    ['TYPE', 'Displays the contents of a text file.'],
    ['VER', 'Displays the Windows version.'],
    ['VOL', 'Displays a disk volume label and serial number.'],
    ['WHOAMI', 'Displays current user information.'],
    ['XCOPY', 'Copies files and directory trees.'],
  ];
  for (const [name, desc] of cmds) {
    print(name.padEnd(16) + desc);
  }
}

function cmdDir(args) {
  let targetPath = currentDir;
  const flags = args.filter(a => a.startsWith('/'));
  const pathArg = args.find(a => !a.startsWith('/'));
  if (pathArg) targetPath = normalizePath(pathArg);

  const node = getDirNode(targetPath);
  if (!node || node.type !== 'dir') {
    print(`The system cannot find the path specified.`); return;
  }

  print(` Volume in drive C is Windows`);
  print(` Volume Serial Number is B4D7-9F3A`);
  printBlank();
  print(` Directory of ${targetPath}`);
  printBlank();

  const children = node.children || {};
  let fileCount = 0, dirCount = 0, totalSize = 0;

  const dStr = now.toLocaleDateString('en-US', {month:'2-digit',day:'2-digit',year:'numeric'});
  const tStr = now.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
  print(`${dStr}  ${tStr}    <DIR>          .`);
  print(`${dStr}  ${tStr}    <DIR>          ..`);

  for (const [name, item] of Object.entries(children)) {
    const date = item.date || `${dStr}  ${tStr}`;
    if (item.type === 'dir') {
      print(`${date}    <DIR>          ${name}`);
      dirCount++;
    } else {
      const size = (item.size || 0).toString().padStart(14);
      print(`${date} ${size} ${name}`);
      fileCount++;
      totalSize += item.size || 0;
    }
  }

  printBlank();
  print(`${fileCount.toString().padStart(16)} File(s) ${totalSize.toString().padStart(14)} bytes`);
  print(`${(dirCount+2).toString().padStart(16)} Dir(s)  ${(128849018880).toLocaleString().padStart(14)} bytes free`);
}

function cmdCd(arg) {
  if (!arg || arg === '') {
    print(currentDir); return;
  }
  if (/^[A-Za-z]:$/.test(arg)) {
    currentDir = arg + '\\';
    return;
  }
  const target = normalizePath(arg);
  const node = getDirNode(target);
  if (node && node.type === 'dir') {
    currentDir = target;
  } else {
    print('The system cannot find the path specified.');
  }
}

function cmdEcho(raw) {
  if (!raw) { print('ECHO is on.'); return; }
  if (raw.toLowerCase() === 'on') { print('ECHO is on.'); return; }
  if (raw.toLowerCase() === 'off') { print('ECHO is off.'); return; }
  print(raw);
}

function cmdType(args) {
  if (!args.length) { print('The syntax of the command is incorrect.'); return; }
  const filePath = normalizePath(args[0]);
  const parts = filePath.split('\\');
  const fileName = parts.pop();
  const dirPath = parts.join('\\');
  const node = getDirNode(dirPath);
  if (node && node.children && node.children[fileName]) {
    const file = node.children[fileName];
    if (file.type === 'file') {
      print(file.content || '');
      return;
    }
  }
  if (createdFiles[filePath]) {
    print(createdFiles[filePath].content || '');
    return;
  }
  print(`The system cannot find the file specified.`);
}

function cmdMkdir(args) {
  if (!args.length) { print('The syntax of the command is incorrect.'); return; }
  const dirName = args[0];
  const target = normalizePath(dirName);
  const parts = target.split('\\');
  const name = parts.pop();
  const parentPath = parts.join('\\');
  const parent = getDirNode(parentPath);
  if (!parent) { print('The system cannot find the path specified.'); return; }
  if (parent.children[name]) { print('A subdirectory or file already exists.'); return; }
  parent.children[name] = { type: 'dir', children: {} };
}

function cmdRmdir(args) {
  if (!args.length) { print('The syntax of the command is incorrect.'); return; }
  const target = normalizePath(args[0]);
  const parts = target.split('\\');
  const name = parts.pop();
  const parentPath = parts.join('\\');
  const parent = getDirNode(parentPath);
  if (!parent || !parent.children[name]) { print('The system cannot find the file specified.'); return; }
  const node = parent.children[name];
  if (node.type !== 'dir') { print('The directory name is invalid.'); return; }
  if (Object.keys(node.children).length > 0 && !args.includes('/s')) {
    print('The directory is not empty.'); return;
  }
  delete parent.children[name];
}

function cmdDel(args) {
  if (!args.length) { print('The syntax of the command is incorrect.'); return; }
  const filePath = normalizePath(args[0]);
  const parts = filePath.split('\\');
  const fileName = parts.pop();
  const dirPath = parts.join('\\');
  const node = getDirNode(dirPath);
  if (node && node.children && node.children[fileName]) {
    delete node.children[fileName];
    return;
  }
  print(`Could Not Find ${filePath}`);
}

function cmdCopy(args) {
  if (args.length < 2) { print('The syntax of the command is incorrect.'); return; }
  const src = normalizePath(args[0]);
  const dst = normalizePath(args[1]);
  const srcParts = src.split('\\'); const srcName = srcParts.pop(); const srcDir = getDirNode(srcParts.join('\\'));
  if (!srcDir || !srcDir.children[srcName]) { print('The system cannot find the file specified.'); return; }
  const file = srcDir.children[srcName];
  const dstParts = dst.split('\\'); const dstName = dstParts.pop(); const dstDir = getDirNode(dstParts.join('\\'));
  if (!dstDir) { print('The system cannot find the path specified.'); return; }
  dstDir.children[dstName] = {...file};
  print('        1 file(s) copied.');
}

function cmdMove(args) {
  if (args.length < 2) { print('The syntax of the command is incorrect.'); return; }
  cmdCopy(args);
  cmdDel([args[0]]);
}

function cmdRen(args) {
  if (args.length < 2) { print('The syntax of the command is incorrect.'); return; }
  const src = normalizePath(args[0]);
  const parts = src.split('\\'); const name = parts.pop(); const dir = getDirNode(parts.join('\\'));
  if (!dir || !dir.children[name]) { print('The system cannot find the file specified.'); return; }
  dir.children[args[1]] = dir.children[name];
  delete dir.children[name];
}

function cmdSet(raw) {
  if (!raw) {
    for (const [k, v] of Object.entries(envVars)) print(`${k}=${v}`);
    return;
  }
  if (raw.includes('=')) {
    const idx = raw.indexOf('=');
    const key = raw.substring(0, idx).toUpperCase();
    const val = raw.substring(idx + 1);
    envVars[key] = val;
  } else {
    const key = raw.toUpperCase();
    if (envVars[key]) print(`${key}=${envVars[key]}`);
    else print(`Environment variable ${raw} not defined`);
  }
}

    promptEl.style.color = '#c0c0c0';
    return;
  }
  const code = args[0].toLowerCase();
  const colorMap = {
    '0':'#000','1':'#000080','2':'#008000','3':'#008080',
    '4':'#800000','5':'#800080','6':'#808000','7':'#c0c0c0',
    '8':'#808080','9':'#0000ff','a':'#00ff00','b':'#00ffff',
    'c':'#ff0000','d':'#ff00ff','e':'#ffff00','f':'#ffffff'
  };
  if (code.length === 2) {
    const bg = colorMap[code[0]];
    const fg = colorMap[code[1]];
    if (bg && fg) {
      terminal.style.background = bg;
      terminal.style.color = fg;
      cmdInput.style.color = fg;
      promptEl.style.color = fg;
      document.querySelectorAll('.output-line').forEach(el => el.style.color = fg);

}

function cmdTree(args) {
  const target = args.find(a => !a.startsWith('/')) || currentDir;
  const node = getDirNode(normalizePath(target));
  if (!node) { print('The system cannot find the path specified.'); return; }
  print(`Folder PATH listing for volume Windows`);
  print(`Volume serial number is B4D7-9F3A`);
  print(normalizePath(target));
  printTree(node, '');
}

function printTree(node, prefix) {
  if (!node.children) return;
  const entries = Object.entries(node.children).filter(([,v]) => v.type === 'dir');
  entries.forEach(([name, child], i) => {
    const isLast = i === entries.length - 1;
    print(`${prefix}${isLast ? '└' : '├'}───${name}`);
    printTree(child, prefix + (isLast ? '    ' : '│   '));
  });
}

function cmdFind(args, raw) {
  const strMatch = raw.match(/"([^"]+)"/);
  if (!strMatch) { print('FIND: Parameter format not correct'); return; }
  const str = strMatch[1];
  const fileArg = args.find(a => !a.startsWith('/') && !a.startsWith('"'));
  if (!fileArg) { print('FIND: File not found - '); return; }
  const filePath = normalizePath(fileArg);
  const parts = filePath.split('\\'); const fname = parts.pop();
  const dir = getDirNode(parts.join('\\'));
  if (!dir || !dir.children || !dir.children[fname]) { print(`File not found - ${fileArg}`); return; }
  const content = dir.children[fname].content || '';
  print(`---------- ${filePath.toUpperCase()}`);
  content.split('\n').forEach(line => { if (line.toLowerCase().includes(str.toLowerCase())) print(line); });
}

// Window controls
function closeWindow() {
  win.style.display = 'none';
}

function minimizeWindow() {
  win.style.display = 'none';
  setTimeout(() => win.style.display = 'flex', 2000);
}

function toggleMaximize() {
  if (isMaximized) {
    win.style.width = originalStyle.width;
    win.style.height = originalStyle.height;
    win.style.position = '';
    win.style.top = '';
    win.style.left = '';
    isMaximized = false;
  } else {
    originalStyle = { width: win.style.width, height: win.style.height };
    win.style.width = '100vw';
    win.style.height = '100vh';
    win.style.position = 'fixed';
    win.style.top = '0';
    win.style.left = '0';
    isMaximized = true;
  }
}

// Drag window
let dragging = false, dragOffX = 0, dragOffY = 0;
titlebar.addEventListener('mousedown', e => {
  if (isMaximized) return;
  dragging = true;
  const rect = win.getBoundingClientRect();
  dragOffX = e.clientX - rect.left;
  dragOffY = e.clientY - rect.top;
  win.style.position = 'fixed';
  document.body.style.userSelect = 'none';
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  win.style.left = (e.clientX - dragOffX) + 'px';
  win.style.top = (e.clientY - dragOffY) + 'px';
});
document.addEventListener('mouseup', () => {
  dragging = false;
  document.body.style.userSelect = '';
});

init();
